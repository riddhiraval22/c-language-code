{% extends 'header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
</head>
<body>
<h1>Change Password</h1>
  {% if msg %}
    <b style="color: blue;">{{msg}}</b>
  {% endif %}
<form name="'change-password" method ="post" action="{% url 'change-password' %}" enctype="multipart/form-data">
{% csrf_token %}
<table>

    
    <tr>
        <td>
            Old Password
        </td>
        <td><input type="password" name="old_password"></td>
    </tr>
    <tr>
        <td>
            New Password
        </td>
        <td><input type="password" name="new"></td>
    </tr>
    <tr>
        <td>
            Confirm New Password
        </td>
        <td><input type="password" name="cnew _password"></td>
    </tr>
    
    <tr>
        <td colspan="2" align="center">
            <input type="submit" value="Change Password" class="btn btn-primary">

        </td>
    </tr>
</table>    


</form>

</body>
</html>
{% endblock %}
